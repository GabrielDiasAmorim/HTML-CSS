<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aprendendo display</title>
    <style>
        .um{
            display: block;
        }
        .dois{
            display: inline;
        }
        .tres{
            display: inline-block;
        }
    </style>
</head>
<body>
    <h1>aprendendo display</h1>
    <div class="um">olá</div>
    <div class="dois">olá</div>
    <div class="tres">olá</div>
</body>
</html>
