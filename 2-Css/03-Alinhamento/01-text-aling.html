<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aprendendo text-aling</title>
    <style>
        .padrao{
            text-align: left;
        }
        .center{
            text-align: center;
        }
        .right{
            text-align: right;
        }
        .justify{
            text-align: justify;
        }
    </style>
</head>
<body>
    <h1>aprendendo alinhamento de texto</h1>
    <h1 class="padrao">oi</h1>
    <h1 class="center">oi</h1>
    <h1 class="right">oi</h1>
    <h1 class="justify">oiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiiii</h1>
</body>
</html>
