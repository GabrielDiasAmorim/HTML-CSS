<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aprendendo font-family</title>
    <style>
        p{
            font-family: arial;
        }
        .verdana{
            font-family: verdana;
        }
        .serif{
            font-family: serif;
        }
        .sans{
            font-family: sans-serif;
        }
    </style>
</head>
<body>
    <h1>aprendendo a utilizar font-family</h1>
    <p>olá, estou usando a font arial</p>
    <p class="verdana">olá, estou usando a font verdana</p>
    <p class="serif">olá, estou usando a font serif</p>
    <p class="sans">olá, estou usando a font sans-serif</p>
</body>
</html>
