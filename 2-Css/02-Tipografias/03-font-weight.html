<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aprendendo font-weight</title>
    <style>
        p{
            font-weight: bold;
        }
        .normal{
            font-weight: normal;
        }
    </style>
</head>
<body>
    <p>está font sera em negrito</p>
    <p class="normal">esta fomt sera normal</p>
</body>
</html>
