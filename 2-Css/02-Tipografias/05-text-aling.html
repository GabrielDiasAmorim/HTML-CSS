<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aprendendo font-aling</title>
    <style>
        h1{
            text-align: center;
        }
        .right{
            text-align: right;
        }
        p{
            text-align: justify;
        }
    </style>
</head>
<body>
    <h1>aprendendo fomt-aling (centralizado)</h1>
    <p>esse parágrafo esta alinhado a esquerda como padrão</p>
    <p class="right">esse parágrafo vai ser alinhado a direita</p>
    <p>esse parágrafo vai ser alinhado nos dois lados (justify)</p>
</body>
</html>
