<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aprendendo borda style</title>
    <style>
        div{
            border-style: solid;
            margin: 5px;
            padding: 5px;
        }
        .tra{
            border-style: dashed;
            margin: 5px;
            padding: 5px;
        }
        .pon{
            border-style: dotted;
            margin: 5px;
            padding: 5px;
        }
        .dup{
            border-style: double;
            margin: 5px;
            padding: 5px;
        }
    </style>
</head>
<body>
    <h1>aprendendo bordar style</h1>
    <div>normal</div>
    <div class="tra">tracejado</div>
    <div class="pon">pontilhado</div>
    <div class="dup">dupla</div>
</body>
</html>
