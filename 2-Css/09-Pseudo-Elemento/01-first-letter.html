<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aprendendo a utilizar first-letter</title>
    <style>
        p::first-letter{
            font-size: 30px;
        }
    </style>
</head>
<body>
    <h1>aprendendo a utilizar ::first-letter</h1>
    <p>olá, a primeira letra desse parágrafo é maior que o restante dele</p>
</body>
</html>
