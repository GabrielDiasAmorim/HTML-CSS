<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aprendendo first-line</title>
    <style>
        p::first-line{
            color: green;
        }
    </style>
</head>
<body>
    <h1>aprendendo a utilizar :: first-line</h1>
    <p>a primeira linha desse parágrafo terá uma cor verde veja como os seus próprios olhos</p>
</body>
</html>
