<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aprendendo direções</title>
    <style>
        p{
            background-image: linear-gradient(to left, red, yellow);
        }
        .dois{
            background-image: linear-gradient(to top, blue, white);
        }
        .tres{
            background-image: linear-gradient(45deg, green, black);
        }
    </style>
</head>
<body>
    <h1>aprendendo direções</h1>
    <p>da esquerda para direita</p>
    <p class="dois">top</p>
    <p class="tres">45 graus</p>
</body>
</html>
