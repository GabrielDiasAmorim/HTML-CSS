<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pseudo class</title>
    <style>
        div> p {
            display: none;
        }
        div:hover > p {
            display: block;
            background-color: red;
        }
    </style>
</head>
<body>
    <h1>conteúdo especial</h1>
    <div>
        pase o mause aqui 
        <p>SURPRESA</p>
    </div>
    <p>veja o conteúdo aparecendo</p>
</body>
</html>
